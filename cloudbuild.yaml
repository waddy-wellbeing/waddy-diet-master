options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE_NAME: bite-right-web
  _REGION: europe-west4
  _NEXT_PUBLIC_SUPABASE_URL_SECRET: NEXT_PUBLIC_SUPABASE_URL
  _NEXT_PUBLIC_SUPABASE_ANON_KEY_SECRET: NEXT_PUBLIC_SUPABASE_ANON_KEY
  _NEXT_PUBLIC_SITE_URL_SECRET: NEXT_PUBLIC_SITE_URL
  _NEXT_PUBLIC_VAPID_PUBLIC_KEY_SECRET: NEXT_PUBLIC_VAPID_PUBLIC_KEY
  _SUPABASE_SERVICE_ROLE_SECRET: SUPABASE_SERVICE_ROLE_KEY
  _VAPID_PRIVATE_KEY_SECRET: VAPID_PRIVATE_KEY
  _VAPID_SUBJECT_SECRET: VAPID_SUBJECT

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_NEXT_PUBLIC_SUPABASE_URL_SECRET}/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/${_NEXT_PUBLIC_SUPABASE_ANON_KEY_SECRET}/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - versionName: projects/$PROJECT_ID/secrets/${_NEXT_PUBLIC_SITE_URL_SECRET}/versions/latest
      env: NEXT_PUBLIC_SITE_URL
    - versionName: projects/$PROJECT_ID/secrets/${_NEXT_PUBLIC_VAPID_PUBLIC_KEY_SECRET}/versions/latest
      env: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    - versionName: projects/$PROJECT_ID/secrets/${_VAPID_SUBJECT_SECRET}/versions/latest
      env: VAPID_SUBJECT

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build image
    entrypoint: bash
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_SITE_URL
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY
    args:
      - -ceu
      - |
        : "$${NEXT_PUBLIC_SUPABASE_URL:?Missing NEXT_PUBLIC_SUPABASE_URL secret}"
        : "$${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret}"

        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
          --build-arg NEXT_PUBLIC_SITE_URL="$$NEXT_PUBLIC_SITE_URL" \
          --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="$$NEXT_PUBLIC_VAPID_PUBLIC_KEY" \
          -t "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA" \
          -t "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest" \
          .

  - name: gcr.io/cloud-builders/docker
    id: Push image
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy to Cloud Run
    entrypoint: bash
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_SITE_URL
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY
      - VAPID_SUBJECT
    args:
      - -ceu
      - |
        gcloud run deploy "${_SERVICE_NAME}" \
          --image="gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --max-instances=2 \
          --port=8080 \
          --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL=$$NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_VAPID_PUBLIC_KEY=$$NEXT_PUBLIC_VAPID_PUBLIC_KEY,VAPID_SUBJECT=$$VAPID_SUBJECT" \
          --set-secrets="SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_SECRET}:latest,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY_SECRET}:latest"

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest